# MeetService: сигналинг WebRTC + Postgres.
#   cp .env.docker.example .env   # задайте JWT_SECRET_KEY
#   docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: meetservice_db
    environment:
      POSTGRES_USER: ${MEET_DB_USER:-meet}
      POSTGRES_PASSWORD: ${MEET_DB_PASSWORD:-meet}
      POSTGRES_DB: ${MEET_DB_NAME:-meet_service}
    volumes:
      - meet_postgres_data:/var/lib/postgresql/data
    ports:
      - "${MEET_DB_PORT:-5436}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - meet-net

  meet:
    build: .
    container_name: meetservice_api
    env_file:
      - .env
    ports:
      - "${MEET_PORT:-8480}:8480"
    environment:
      PORT: ${MEET_PORT:-8480}
      USE_SQLITE: "false"
      DATABASE_URL: postgresql://${MEET_DB_USER:-meet}:${MEET_DB_PASSWORD:-meet}@postgres:5432/${MEET_DB_NAME:-meet_service}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ICE_SERVERS_JSON: ${ICE_SERVERS_JSON:-[{"urls":["stun:stun.l.google.com:19302"]}]}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - meet-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8480/health').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  meet_postgres_data:

networks:
  meet-net:
    driver: bridge
